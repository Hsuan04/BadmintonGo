server:
  port: 8086
spring:
  application:
    name: common-service
  datasource:
    url: jdbc:postgresql://localhost:5432/badmintongo
    username: ${DB_USER:test}
    password: ${DB_PASSWORD:test}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%X{traceId}] --- [%thread] %-40.40logger{39} : %m%n"
  level:
    org.hibernate.SQL: INFO  # 顯示執行的 SQL 語句
    org.hibernate.orm.jdbc.bind: INFO  # 顯示 SQL 中的參數綁定