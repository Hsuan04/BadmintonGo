services:
  badmintongo-db:
    image: postgres:15-alpine
    container_name: badmintongo-db
    environment:
      POSTGRES_DB: ${DB_NAME:-badmintongo} # 資料庫名稱 badmintongo
      POSTGRES_USER: ${DB_USER:-test}  # 資料庫user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-test}  # 資料庫password
      TZ: Asia/Taipei
    ports:
      - "5432:5432"
    volumes:
      - ./infra-data/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d badmintongo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - badminton-network
  # Redi
  badmintongo-redis:
    image: redis:7.2-alpine
    container_name: badmintongo-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - ./infra-data/redis-data:/data
    networks:
      - badminton-network

  # RabbitMQ
  badmintongo-mq:
    image: rabbitmq:3.12-management-alpine
    container_name: badmintongo-mq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER:-test}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD:-test}
    ports:
      - "5672:5672"   # 訊息傳輸 Port
      - "15672:15672" # 管理後台界面
    networks:
      - badminton-network

  # MinIO: S3 兼容存儲。負責存放場館照片，避免將大型二進位檔案存入資料庫，提升查詢效能
  badmintongo-minio:
    image: minio/minio
    container_name: badmintongo-minio
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Console 管理介面
    volumes:
      - ./infra-data/minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - badminton-network

networks:
  badminton-network:
    driver: bridge