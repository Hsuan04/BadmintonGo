server:
  port: 8082

spring:
  application:
    name: court-service
  datasource:
    url: jdbc:postgresql://localhost:5432/badmintongo
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Taipei
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration
logging:
  level:
    org.hibernate.SQL: ERROR
    org.hibernate.orm.jdbc.bind: ERROR
# Swagger / Knife4j 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
knife4j:
  enable: true

# S3 配置 (court-app 需要處理場地照片)
s3:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: password123
  bucket-name: court-images
  region: us-east-1