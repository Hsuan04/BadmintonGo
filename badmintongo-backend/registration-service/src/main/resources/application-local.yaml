server:
  port: 8084

spring:
  application:
    name: session-service
  datasource:
    url: jdbc:postgresql://localhost:5432/badmintongo
    username: ${DB_USER:test}
    password: ${DB_PASSWORD:test}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true